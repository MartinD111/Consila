        html {

        /* IMPROVED: Liquid Frosted Glass Effect for Popup */
        .frosted-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5),
                inset 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
        }

        .dark .glass-nav {
            background: rgba(15, 23, 42, 0.90);
            border-bottom: 1px solid #1e293b;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #0056b3;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #06498c;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Timeline Animations */
        .timeline-item {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .timeline-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Continuous Marquee Animation */
        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .animate-marquee {
            display: flex;
            width: max-content;
            animation: marquee 60s linear infinite;
        }

        .animate-marquee:hover {
            animation-play-state: paused;
        }

        .shadow-mask {
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }
    </style>
</head>

            const [visibleItems, setVisibleItems] = useState(3);
            const [activeSection, setActiveSection] = useState('home');

            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                setTimeout(() => lucide.createIcons(), 50);
            }, [lang, solIndex, darkMode]);

                const handleResize = () => {
                    if (window.innerWidth >= 1024) setVisibleItems(3);
                    else if (window.innerWidth >= 640) setVisibleItems(2);
                    else setVisibleItems(1);
                };
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    setSolIndex((current) => {
                        const maxIndex = t.solutions.items.length - visibleItems;
                        return current >= maxIndex ? 0 : current + 1;
                    });
                }, 5000);
                return () => clearInterval(timer);
            }, [t.solutions.items.length, visibleItems, lang]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (langDropdownRef.current && !langDropdownRef.current.contains(event.target)) {
                        setIsLangDropdownOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            // Track active section on scroll
            useEffect(() => {
                const sections = ['home', 'solutions', 'about', 'partners', 'contact'];

                    let current = 'home';
                    for (const id of sections) {
                        const el = document.getElementById(id);
                        if (el) {
                            const rect = el.getBoundingClientRect();
                            if (rect.top <= 120) {
                                current = id;
                            }
                        }
                    }
                    setActiveSection(current);
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                handleScroll();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    const headerOffset = 80;
                    const elementPosition = element.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: "smooth"
                    });
                }
            };

            const changeLang = (code) => {
                setLang(code);
                setIsLangDropdownOpen(false);
            };

            const currentLangData = languages.find(l => l.code === lang);

            // --- COMPONENTS ---

            const Logo = () => (
                <div
                    className="flex items-center cursor-pointer h-20"

                        src={darkMode ? "./logo-light.png" : "./logo.png"}

                        onError={(e) => {
                            e.target.style.display = 'none';
                            e.target.nextSibling.style.display = 'flex';
                        }}
                    />

                    {/* Fallback in case image fails */}
                    <div className="hidden items-center gap-2 font-bold text-2xl tracking-tight text-slate-900">
                        <div className="w-9 h-9 bg-brand-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand-200 overflow-hidden shrink-0">
                            <span className="font-bold text-lg absolute">C</span>
                        </div>
                    </div>
                </div>
            );

            // === Interactive Map/Path Timeline Component ===
            const Timeline = ({ items }) => {
                const containerRef = useRef(null);
                const [progressHeight, setProgressHeight] = useState(0);
                const [visibleItems, setVisibleItems] = useState([]);

                useEffect(() => {
                    const handleScroll = () => {
                        if (!containerRef.current) return;

                        const container = containerRef.current;
                        const rect = container.getBoundingClientRect();
                        const windowHeight = window.innerHeight;
                        const triggerPoint = windowHeight * 0.75;

                        const relativeTop = rect.top - triggerPoint;
                        const totalHeight = rect.height;

                        let progress = 0;
                        if (relativeTop < 0) {
                            progress = Math.abs(relativeTop);
                        }
                        progress = Math.min(progress, totalHeight);

                        setProgressHeight(progress);

                        const newVisibleItems = [];
                        const itemElements = container.querySelectorAll('.timeline-node');
                        itemElements.forEach((el, index) => {
                            const itemRect = el.getBoundingClientRect();
                            if (itemRect.top < windowHeight * 0.85) {
                                newVisibleItems.push(index);
                            }
                        });
                        setVisibleItems(newVisibleItems);
                    };

                    window.addEventListener('scroll', handleScroll);
                    handleScroll();
                    return () => window.removeEventListener('scroll', handleScroll);
                }, []);

                return (
                    <div className="relative py-10 pl-4 md:pl-0" ref={containerRef}>
                        <div className="absolute left-4 md:left-1/2 top-0 bottom-0 w-0.5 border-l-2 border-dashed border-slate-300 -translate-x-1/2 h-full"></div>

                        <div
                            className="absolute left-4 md:left-1/2 top-0 w-1 bg-brand-600 -translate-x-1/2 shadow-[0_0_10px_rgba(0,86,179,0.5)] transition-all duration-100 ease-linear rounded-full"
                            style={{ height: `${progressHeight}px` }}
                        >
                            <div className="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-4 h-4 bg-white border-4 border-brand-600 rounded-full shadow-lg z-20">
                                <div className="absolute inset-0 bg-brand-600 rounded-full animate-ping opacity-75"></div>
                            </div>
                        </div>

                        <div className="space-y-16 md:space-y-24 relative z-10">
                            {items.map((item, idx) => {
                                const isVisible = visibleItems.includes(idx);
                                const isEven = idx % 2 === 0;

                                return (
                                    <div
                                        key={idx}
                                        className={`timeline-node relative flex flex-col md:flex-row items-center gap-8 ${isVisible ? 'visible' : ''} timeline-item`}
                                    >
                                        <div className="absolute left-4 md:left-1/2 -translate-x-1/2 w-8 h-8 bg-white border-2 border-slate-200 rounded-full flex items-center justify-center z-10 shadow-sm font-bold text-xs text-slate-500">
                                            {item.year.slice(2)}
                                        </div>

                                        <div className={`flex-1 md:w-1/2 w-full pl-12 md:pl-0 ${isEven ? 'md:text-right md:pr-16' : 'md:order-2 md:pl-16'}`}>
                                            <span className="inline-block px-3 py-1 rounded-full bg-brand-50 dark:bg-brand-900/30 text-brand-700 dark:text-brand-300 text-xs font-bold mb-2 border border-brand-100 dark:border-brand-800">
                                                {item.year}
                                            </span>
                                            <h3 className="text-xl font-bold text-slate-900 dark:text-white mb-2">{item.title}</h3>
                                            <p className="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">{item.desc}</p>
                                        </div>

                                        <div className={`flex-1 md:w-1/2 w-full pl-12 md:pl-0 ${isEven ? 'md:order-2 md:pl-16' : 'md:text-right md:pr-16'}`}>
                                            <div className="relative group overflow-hidden rounded-2xl shadow-md border border-slate-100 aspect-video hover:shadow-xl transition-all duration-500">
                                                <img
                                                    src={item.img}
                                                    alt={item.title}
                                                    className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                                />
                                                <div className="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-slate-950 transition-colors duration-300">

                    {/* --- HEADER (Fixed Top) --- */}
                    <nav className="fixed w-full z-50 top-0 py-2 glass-nav px-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center h-16">
                            <Logo />

                            <div className="hidden lg:flex items-center bg-slate-100/80 dark:bg-slate-800/80 rounded-full px-1.5 py-1 border border-slate-200/50 dark:border-slate-700/50">
                                <button onClick={() => scrollToSection('home')} className={`px-5 py-2 font-bold text-sm rounded-full transition-all duration-300 ease-in-out ${activeSection === 'home' ? 'bg-white dark:bg-slate-700 text-brand-600 dark:text-brand-400 shadow-sm' : 'text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:hover:text-brand-400 hover:bg-white/60 dark:hover:bg-slate-700/60'}`}>{t.nav.home}</button>
                                <button onClick={() => scrollToSection('solutions')} className={`px-5 py-2 font-bold text-sm rounded-full transition-all duration-300 ease-in-out ${activeSection === 'solutions' ? 'bg-white dark:bg-slate-700 text-brand-600 dark:text-brand-400 shadow-sm' : 'text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:hover:text-brand-400 hover:bg-white/60 dark:hover:bg-slate-700/60'}`}>{t.nav.solutions}</button>
                                <button onClick={() => scrollToSection('about')} className={`px-5 py-2 font-bold text-sm rounded-full transition-all duration-300 ease-in-out ${activeSection === 'about' ? 'bg-white dark:bg-slate-700 text-brand-600 dark:text-brand-400 shadow-sm' : 'text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:hover:text-brand-400 hover:bg-white/60 dark:hover:bg-slate-700/60'}`}>{t.popup.about}</button>
                                <button onClick={() => scrollToSection('partners')} className={`px-5 py-2 font-bold text-sm rounded-full transition-all duration-300 ease-in-out ${activeSection === 'partners' ? 'bg-white dark:bg-slate-700 text-brand-600 dark:text-brand-400 shadow-sm' : 'text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:hover:text-brand-400 hover:bg-white/60 dark:hover:bg-slate-700/60'}`}>{t.popup.partners}</button>

                            </div>

                            <div className="flex items-center gap-2 md:gap-4">
                                <div className="relative" ref={langDropdownRef}>
                                    <button
                                        onClick={() => setIsLangDropdownOpen(!isLangDropdownOpen)}
                                        className="w-10 h-10 rounded-full overflow-hidden border border-brand-200 shadow-sm shrink-0 flex items-center justify-center hover:scale-105 transition-transform bg-white text-brand-700"
                                    >
                                        <div className="flex flex-col items-center justify-center scale-75">
                                            <img src={currentLangData.flag} alt={lang} className="w-6 h-4 object-cover rounded shadow-sm mb-1" />
                                            <span className="text-[10px] font-bold leading-none">{lang.toUpperCase()}</span>
                                        </div>
                                    </button>

                                    {isLangDropdownOpen && (
                                        <div className="absolute top-full right-0 mt-2 w-32 bg-white rounded-xl shadow-xl border border-slate-100 overflow-hidden animate-fade-in z-50">
                                            {languages.map((l) => (
                                                <button
                                                    key={l.code}
                                                    onClick={() => changeLang(l.code)}
                                                    className={`w-full text-left px-4 py-2 text-sm flex items-center gap-3 hover:bg-slate-50 transition-colors ${lang === l.code ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-slate-600'}`}
                                                >
                                                    <img src={l.flag} alt={l.code} className="w-5 h-4 object-cover rounded shadow-sm" />
                                                    {l.code.toUpperCase()}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {/* Dark Mode Toggle */}
                                <button
                                    onClick={() => setDarkMode(!darkMode)}
                                    className="w-10 h-10 rounded-full border border-slate-200 dark:border-slate-700 shadow-sm flex items-center justify-center hover:scale-105 transition-all bg-white dark:bg-slate-800 text-slate-600 dark:text-yellow-400"
                                >
                                    <IconWrapper name={darkMode ? "sun" : "moon"} size={20} />
                                </button>

                                <button onClick={() => scrollToSection('contact')} className="px-4 py-2 bg-slate-900 dark:bg-brand-600 text-white rounded-full text-xs font-bold hover:bg-brand-600 dark:hover:bg-brand-500 transition-colors shadow-lg hidden xs:block">
                                    {t.popup.contact}
                                </button>
                            </div>
                        </div>
                    </nav >

                    {/* --- MAIN CONTENT (One Page Scroll) --- */}
                    < div className="pt-20" >

                        {/* Hero Section */}
                        < div id="home" className="animate-fade-in" >
                            <header className="relative pt-12 pb-20 overflow-hidden text-center md:text-left px-4">
                                <div className="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center">
                                    <div className="relative z-10">
                                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-50 dark:bg-slate-800 border border-brand-100 dark:border-slate-700 text-brand-700 dark:text-brand-400 text-sm font-medium mb-6">
                                            <span className="w-2 h-2 rounded-full bg-brand-600 animate-pulse"></span>
                                            {t.hero.years}
                                        </div>
                                        <h1 className="text-4xl lg:text-6xl font-bold text-slate-900 dark:text-white leading-tight mb-6">
                                            {t.hero.title}
                                        </h1>
                                        <p className="text-lg text-slate-600 dark:text-slate-400 mb-8 max-w-lg mx-auto md:mx-0">
                                            {t.hero.subtitle}
                                        </p>
                                        <div className="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                                            <button onClick={() => scrollToSection('partners')} className="px-8 py-4 bg-slate-900 dark:bg-brand-600 text-white rounded-full font-semibold shadow-lg hover:bg-slate-800 dark:hover:bg-brand-500 transition-all flex items-center justify-center gap-2">
                                                {t.hero.cta}
                                                <IconWrapper name="chevron-right" size={16} />
                                            </button>
                                        </div>
                                    </div>
                                    <div className="relative">
                                        <div className="absolute inset-0 bg-brand-500 blur-[100px] opacity-20 rounded-full"></div>
                                        <img
                                            src="./passports.jpg"
                                            className="relative z-10 rounded-[2.5rem] shadow-2xl w-full"
                                            alt="Security"
                                        />
                                    </div>
                                </div>
                            </header>

                            {/* Solutions Continuous Marquee */}
                            <section id="solutions" className="py-24 bg-white dark:bg-slate-900 rounded-t-[3rem] shadow-[0_-10px_40px_rgba(0,0,0,0.02)] overflow-hidden transition-colors duration-300">
                                <div className="max-w-7xl mx-auto px-4 mb-16">
                                    <div className="text-center">
                                        <h2 className="text-3xl font-bold text-slate-900 dark:text-white mb-4">{t.solutions.title}</h2>
                                        <div className="h-1.5 w-20 bg-brand-600 rounded-full mx-auto"></div>
                                    </div>
                                </div>

                                <div className="relative shadow-mask">
                                    <div className="animate-marquee flex gap-6 py-4">
                                        {/* Original items */}
                                        {t.solutions.items.map((item, idx) => (
                                            <div key={`orig-${idx}`} className="w-[350px] flex-shrink-0">
                                                <div className="bg-slate-50 dark:bg-slate-800 rounded-2xl overflow-hidden hover:bg-white dark:hover:bg-slate-700 hover:shadow-xl transition-all duration-300 group border border-slate-100 dark:border-slate-700 cursor-default flex flex-col h-full hover:-translate-y-1">
                                                    <div className="h-48 overflow-hidden relative">
                                                        <img
                                                            src={item.img}
                                                            alt={item.title}
                                                            className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                                        />
                                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent"></div>
                                                        <div className="absolute bottom-4 left-4 right-4 flex items-center justify-between">
                                                            <div className="bg-white/90 backdrop-blur-sm p-2 rounded-xl text-brand-600 shadow-sm">
                                                                <IconWrapper name={item.icon} size={20} />
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="p-6 flex-1 flex flex-col">
                                                        <h3 className="font-bold text-slate-900 dark:text-white text-lg mb-2">{item.title}</h3>
                                                        <p className="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">{item.desc}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        {/* Duplicate items for seamless loop */}
                                        {t.solutions.items.map((item, idx) => (
                                            <div key={`dup-${idx}`} className="w-[350px] flex-shrink-0">
                                                <div className="bg-slate-50 rounded-2xl overflow-hidden hover:bg-white hover:shadow-xl transition-all duration-300 group border border-slate-100 cursor-default flex flex-col h-full hover:-translate-y-1">
                                                    <div className="h-48 overflow-hidden relative">
                                                        <img
                                                            src={item.img}
                                                            alt={item.title}
                                                            className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                                        />
                                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent"></div>
                                                        <div className="absolute bottom-4 left-4 right-4 flex items-center justify-between">
                                                            <div className="bg-white/90 backdrop-blur-sm p-2 rounded-xl text-brand-600 shadow-sm">
                                                                <IconWrapper name={item.icon} size={20} />
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="p-6 flex-1 flex flex-col">
                                                        <h3 className="font-bold text-slate-900 text-lg mb-2">{item.title}</h3>
                                                        <p className="text-slate-600 text-sm leading-relaxed">{item.desc}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>
                        </div >

                        {/* About Section */}
                        < section id="about" className="py-24 bg-slate-50 dark:bg-slate-950 transition-colors duration-300" >
                            <div className="max-w-5xl mx-auto px-4">
                                <div className="text-center mb-16">
                                    <div className="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                        <IconWrapper name="info" size={32} />
                                    </div>
                                    <h2 className="text-3xl font-bold text-slate-900 dark:text-white mb-4">{t.about.title}</h2>
                                    <div className="text-slate-600 dark:text-slate-400 text-lg leading-relaxed max-w-2xl mx-auto">
                                        {t.about.desc.map((paragraph, index) => (
                                            <p key={index} className="mb-4 last:mb-0">{paragraph}</p>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white dark:bg-slate-900 p-6 md:p-12 rounded-[2.5rem] shadow-xl border border-slate-100 dark:border-slate-800">
                                    <div className="text-center mb-16">
                                        <h3 className="text-2xl font-bold text-slate-900 dark:text-white inline-flex items-center gap-3">
                                            <span className="p-2 bg-brand-100 dark:bg-slate-800 rounded-full text-brand-600 dark:text-brand-400"><IconWrapper name="history" size={24} /></span>
                                            {t.about.historyTitle}
                                        </h3>
                                    </div>
                                    <Timeline items={t.about.timeline} />
                                </div>
                            </div>
                        </section >

                        {/* Partners Section */}
                        < section id="partners" className="py-24 bg-white dark:bg-slate-900 relative overflow-hidden transition-colors duration-300" >
                            <div className="max-w-5xl mx-auto px-4 relative z-10">
                                <div className="bg-slate-900 text-white rounded-[2.5rem] p-8 md:p-12 shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-brand-500/20 rounded-full blur-3xl -mr-16 -mt-16"></div>

                                    <div className="relative z-10 grid md:grid-cols-2 gap-12 items-center">
                                        <div>
                                            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/10 text-brand-300 text-xs font-bold uppercase tracking-widest mb-6">
                                                Strategic Partner
                                            </div>
                                            <h2 className="text-3xl md:text-4xl font-bold mb-6">{t.partners.title}</h2>
                                            <p className="text-slate-300 text-lg leading-relaxed mb-8">{t.partners.cetis_desc}</p>
                                        </div>
                                        <div className="bg-white text-slate-900 rounded-3xl p-8 flex flex-col items-center justify-center text-center shadow-inner">
                                            <img
                                                src="./cetis_logo.png"
                                                alt="CETIS"
                                                className="h-16 w-auto object-contain mb-4"
                                            />
                                            <p className="font-semibold text-slate-700">Cetis d.d.</p>
                                            <p className="text-sm text-slate-500">Celje, Slovenia</p>
                                            <div className="mt-6 flex flex-wrap justify-center gap-2">
                                                <span className="px-3 py-1 bg-slate-100 rounded-lg text-xs font-bold">Security Printing</span>
                                                <span className="px-3 py-1 bg-slate-100 rounded-lg text-xs font-bold">Biometrics</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section >



                        <footer id="contact" className="bg-slate-900 text-white py-16">
                            <div className="max-w-7xl mx-auto px-4 text-center">
                                <div className="inline-block p-4 bg-white/10 rounded-full shadow-md mb-8">
                                    <IconWrapper name="mail" size={24} className="text-brand-400" />
                                </div>
                                <h2 className="text-2xl font-bold text-white mb-8">{t.popup.contact}</h2>
                                <div className="flex flex-col md:flex-row justify-center gap-6 md:gap-12 mb-12 text-slate-300 font-medium">

                                    <span className="flex items-center justify-center gap-2 hover:text-brand-400 transition-colors cursor-pointer">
                                        <IconWrapper name="mail" size={18} /> info@consila.si
                                    </span>
                                    <span className="flex items-center justify-center gap-2 hover:text-brand-400 transition-colors cursor-pointer">
                                        <IconWrapper name="map-pin" size={18} /> Ljubljana, Slovenija
                                    </span>
                                </div>
                                <p className="text-sm text-slate-500 border-t border-white/10 pt-8">&copy; {new Date().getFullYear()} Consila d.o.o. {t.footer.rights}</p>
                            </div>
                        </footer>

                    </div >
                </div >
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
